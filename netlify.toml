[build]
# pnpm으로 설치 후 빌드
command = "pnpm install --frozen-lockfile && pnpm run build"
publish = "dist"

[build.environment]
# Netlify 기본 Node가 낮아 에러가 나기 쉬워서 20으로 고정
NODE_VERSION = "20"

# --- SPA 라우팅 (리프레시/딥링크 404 방지) ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# --- 캐시 및 보안 헤더(원하시면 유지) ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "production"
